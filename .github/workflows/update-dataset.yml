name: Update Technology Dataset

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run dataset update script
        run: node update.js

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated webappanalyzer dataset update'
          title: 'Auto-Update: WebAppAnalyzer Dataset'
          body: |
            This PR automatically updates the technology dataset and icons from the `enthec/webappanalyzer` repository.

            **Changes:**
            - Merged latest JSON technology definitions.
            - Updated `categories.json`.
            - Synced latest SVG/PNG icons.
          branch: update-dataset
          labels: automated-update
